<script>
        function switchRole(role) {
            const clientBtn = document.getElementById('role-client');
            const managerBtn = document.getElementById('role-manager');
            
            if (role === 'client') {
                clientBtn.classList.add('bg-surface-container-high', 'text-secondary', 'border-border/40');
                clientBtn.classList.remove('text-text-secondary');
                
                managerBtn.classList.remove('bg-surface-container-high', 'text-secondary', 'border-border/40');
                managerBtn.classList.add('text-text-secondary');
            } else {
                managerBtn.classList.add('bg-surface-container-high', 'text-secondary', 'border-border/40');
                managerBtn.classList.remove('text-text-secondary');
                
                clientBtn.classList.remove('bg-surface-container-high', 'text-secondary', 'border-border/40');
                clientBtn.classList.add('text-text-secondary');
            }
            
            // Add a subtle click feedback
            const btn = role === 'client' ? clientBtn : managerBtn;
            btn.style.transform = 'scale(0.97)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
        }

        // Simple form interaction
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-1', 'ring-secondary/20');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-1', 'ring-secondary/20');
            });
        });
    </script>
