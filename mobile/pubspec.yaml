name: shadapp_client
description: ShadApp - Client Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  file_picker: ^8.0.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  url_launcher: ^6.3.0
  go_router: ^14.0.0
  web_socket_channel: ^3.0.0
